name: UE imaj sondasi (gecici kesif)

# Geçici teşhis workflow'u: dev-slim imajının içinde Android araçları var mı,
# UBT hangi SDK/NDK sürümlerini istiyor — keşfeder. APK akışı oturunca silinir.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Epic container etiketi"
        default: "dev-slim-5.7.4"
        required: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Disk alanı aç
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift
          sudo docker system prune -af || true
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker

      - name: Giriş + imaj çek
        run: |
          echo "${{ secrets.EPIC_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker pull "ghcr.io/epicgames/unreal-engine:${{ inputs.image_tag }}"

      - name: İmaj içini keşfet
        run: |
          docker run --rm "ghcr.io/epicgames/unreal-engine:${{ inputs.image_tag }}" bash -c '
            set -x
            id; whoami; echo HOME=$HOME
            UE=$(ls -d /home/ue4/UnrealEngine 2>/dev/null || ls -d /opt/UnrealEngine 2>/dev/null); echo "UE=$UE"
            ls "$UE/Engine" || true
            ls "$UE/Engine/Extras" 2>/dev/null | head -30 || echo "Extras YOK"
            find "$UE" -maxdepth 4 -iname "SetupAndroid*" 2>/dev/null | head
            env | grep -iE "android|java|ndk|sdk" || echo "ilgili env yok"
            ls /home/ue4 2>/dev/null; ls /opt 2>/dev/null
            command -v sdkmanager javac java adb || echo "java/android araclari PATH'te yok"
            echo "=== UBT Android kaynaklari ==="
            ls "$UE/Engine/Source/Programs/UnrealBuildTool/Platform/Android/" 2>/dev/null | head -20 || echo "UBT Android kaynagi YOK"
            echo "=== UBT istedigi surumler ==="
            grep -rn -E "r[0-9]{2}[a-z]?\"|MinimumSDKLevel|BuildToolsVersion|PlatformsDir|android-[0-9]+" \
              "$UE/Engine/Source/Programs/UnrealBuildTool/Platform/Android/AndroidPlatformSDK.Versioning.cs" 2>/dev/null | head -30 || true
            grep -rn -E "\"r[0-9]+[a-z]?\"" "$UE/Engine/Source/Programs/UnrealBuildTool/Platform/Android/"*.cs 2>/dev/null | head -10 || true
            echo "=== Android_Etc tooltchain dosyalari ==="
            find "$UE/Engine" -maxdepth 5 -iname "*.cs" -path "*Android*" 2>/dev/null | head -20
            df -h / /home 2>/dev/null || true
            true
          '
