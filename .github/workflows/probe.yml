name: UE imaj sondasi (gecici kesif)

# Geçici teşhis workflow'u: dev-slim imajının içinde Android araçları var mı,
# UBT hangi SDK/NDK sürümlerini istiyor — keşfeder. APK akışı oturunca silinir.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Epic container etiketi"
        default: "dev-slim-5.7.4"
        required: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Disk alanı aç
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift
          sudo docker system prune -af || true
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker

      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Giriş + imaj çek
        run: |
          echo "${{ secrets.EPIC_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker pull "ghcr.io/epicgames/unreal-engine:${{ inputs.image_tag }}"

      - name: İmaj içini keşfet
        run: |
          docker run --rm -v "$PWD:/proje:ro" \
            "ghcr.io/epicgames/unreal-engine:${{ inputs.image_tag }}" \
            bash /proje/.github/scripts/probe.sh
