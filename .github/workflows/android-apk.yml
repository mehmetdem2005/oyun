name: Android APK (saf native v2)

# Kayıp Krallık v2 (android/ altındaki :core + :app modülleri).
# Kalite kapısı: 59 senaryoluk duman testi GEÇMEDEN APK üretilmez.
# İndirme: repo → Releases → en üstteki build → app-debug.apk (telefondan tek tık).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["android/**", ".github/workflows/android-apk.yml"]

permissions:
  contents: write   # Release yayını için

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: "8.9" }

      - name: Duman testi — geçmezse APK yok
        working-directory: android
        run: gradle :core:smoke --no-daemon

      - name: APK derle (imzalı debug)
        working-directory: android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: APK'yı artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: KayipKrallik-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Release yayınla (telefondan tek tık indirme)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Kayıp Krallık — build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
