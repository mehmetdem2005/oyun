name: Android APK (saf native — motorsuz)

# Kayıp Krallık'ın saf Kotlin/Android portunu derler. Unreal/Epic imajı GEREKMEZ;
# standart Android SDK ile ~3-5 dakikada imzalı debug APK üretir.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["android/**", ".github/workflows/android-apk.yml"]

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: APK derle (imzalı debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK'yı artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: KayipKrallik-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
