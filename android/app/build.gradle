plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.kayipkrallik.oyun'
    compileSdk 34

    defaultConfig {
        applicationId 'com.kayipkrallik.oyun'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '0.1'
    }

    buildTypes {
        debug {
            // İmzasız değil: debug imzasıyla telefona doğrudan kurulabilir APK.
            minifyEnabled false
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
}
